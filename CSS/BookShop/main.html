<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Nest</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    
    <header>
        <div class="head">
            <div class="icon">
                <img src="icon.png" height="35" class="logo">
                <h2>BookNest</h2>
            </div>

            <nav class="nav">
                <a href="#">Home</a>
                <a href="#">Featured</a>
                <a href="#">Categories</a>
                <a href="#">Contact</a>
            </nav>

            <div class="searchBox">
                <img src="https://thumbnails.yayimages.com/10/8f3/108f39e2.jpg" width="180">
            </div>
        </div>
    </header>

    <div class="banner">
        <img src="">
        <br>
        <button>Explore Books</button>
    </div>

    <div class="featuredBook">
        <h2 id="name">Featured Books <b>+</b></h2>
        <div class="table1">
            <table border="0">
                <thead>
                    <tr>
                        <th>
                            <img src="TheBookThief.png" height="300">
                            <h3>The Book Theif</h3>
                            <p>Markus Zusak</p>
                        </th>
                        <th>
                            <img src="AtomicHabits.png" height="300">
                            <h3>Atomic Habits</h3>
                            <p>James Clear</p>
                        </th>
                        <th>
                            <img src="Becoming.png" height="300">
                            <h3>Becoming</h3>
                            <p>Michelle Obama</p>
                        </th>
                        <th>
                            <img src="educated.png" height="300">
                            <h3>Educated</h3>
                            <p>Tara Westover</p>
                        </th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <div class="cozyReading">
        <div class="top">
            <h2 id="name">Cozy Reading Corners</h2>
            <button>View More</button>
        </div>

        <div class="table1">
            <table border="0">
                <thead>
                    <tr>
                        <th>
                            <img src="cozy1.png" height="300">
                            <h4>The Book Theif</h4>
                            <p>Markus Zusak</p>
                        </th>
                        <th>
                            <img src="cozy2.png" height="300">
                            <h4>Relaxing Reading Nook</h4>
                            <p>James Clear</p>
                        </th>
                        <th>
                            <img src="cozy3.png" height="300">
                            <h4>Outdoor Patio</h4>
                            <p>Michelle Obama</p>
                        </th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <footer>
    </footer>

</body>
</html>
