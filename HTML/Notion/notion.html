<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notion – Build something beautiful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css" />
</head>

<body>
  <div class="frame">

    <!-- browser bar -->
    <div class="browser-bar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <div class="url-bar">notion.so</div>
    </div>

    <!-- nav -->
    <header class="nav">
      <div class="nav-left">
        <a href="#" class="logo">
          <div class="logo-icon">N</div>
          <span>Notion</span>
        </a>
        <nav class="nav-links">
          <a href="#">Product</a>
          <a href="#">Teams</a>
          <a href="#">Individuals</a>
          <a href="#">Community</a>
          <a href="#">Pricing</a>
        </nav>
      </div>
      <div class="nav-right">
        <a href="#">Request a demo</a>
        <a href="#">Log in</a>
        <button class="btn-primary">Get Notion free</button>
      </div>
    </header>

    <!-- hero -->
    <section class="hero">
      <div class="hero-content">

        <div class="badge">
          <div class="badge-dot"></div>
          New · Notion AI is here
        </div>

        <h1 class="hero-title">
          Build<br><em>something</em><br>beautiful.
        </h1>

        <p class="hero-sub">
          Notion helps you and your team get more done — notes, docs, projects, and AI, all in one place.
        </p>

        <div class="hero-ctas">
          <button class="cta-primary">Download free</button>
          <button class="cta-secondary">Request a demo →</button>
        </div>

        <p class="trusted">Trusted by teams at</p>
        <div class="logo-row">
          <span>Amazon</span>
          <span>Netflix</span>
          <span>Atlassian</span>
          <span>Figma</span>
          <span>Uber</span>
        </div>
      </div>

      <!-- illustration -->
      <div class="hero-illustration">
        <div class="scene">

          <!-- Avatar 1 -->
          <div class="avatar">
            <div class="avatar-inner">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
          </div>

          <!-- Avatar 2 with board -->
          <div class="avatar">
            <div class="avatar-inner">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>
            <div class="board">
              <div class="board-lines">
                <div class="board-line"></div>
                <div class="board-line"></div>
                <div class="board-line"></div>
              </div>
            </div>
          </div>

          <!-- Avatar 3 with floating cards -->
          <div class="avatar">
            <div class="avatar-inner">
              <div class="avatar-head"></div>
              <div class="avatar-body"></div>
            </div>

            <div class="float-card float-note">
              <div class="float-note-line"></div>
              <div class="float-note-line"></div>
              <div class="float-note-line"></div>
            </div>

            <div class="float-card float-clock">
              <div class="clock-face">
                <div class="clock-hand hour"></div>
                <div class="clock-hand minute"></div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>

  </div>
</body>
</html>
